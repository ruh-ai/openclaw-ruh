name: CI

on:
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Typecheck + build (gating job) ─────────────────────────────────────
  backend-build:
    name: Backend · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruh-backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install @ruh/logger dependencies
        # @ruh/logger is a file: workspace dep. bun install in ruh-backend/ links
        # the package but does NOT install its own deps (e.g. pino). Install them
        # so TypeScript can resolve imports inside packages/logger/src/index.ts.
        working-directory: packages/logger
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

  # ── 2. Unit tests with coverage ───────────────────────────────────────────
  #    No database service needed — all modules are mocked.
  #    Runs separate bun test processes per group to avoid Bun 1.3.x shared
  #    module-registry pollution between mock.module() calls across files.
  backend-unit:
    name: Backend · unit tests (coverage)
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: ruh-backend

    env:
      NODE_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_URL: postgres://localhost/openclaw_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install @ruh/logger dependencies
        working-directory: packages/logger
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        # test:coverage runs each group in its own bun process:
        #   stores → clients → auth → db → utils → z_routes
        # then asserts the 75% line/function threshold via check-coverage.ts
        run: bun run test:coverage

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          # Multiple lcov files, one per test group
          path: ruh-backend/coverage/
          if-no-files-found: warn

  # ── 3. Contract tests (API shape validation) ──────────────────────────────
  backend-contract:
    name: Backend · contract tests
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: ruh-backend

    env:
      NODE_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_URL: postgres://localhost/openclaw_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install @ruh/logger dependencies
        working-directory: packages/logger
        run: bun install --frozen-lockfile

      - name: Run contract tests
        run: bun run test:contract

  # ── 4. Security tests ─────────────────────────────────────────────────────
  backend-security:
    name: Backend · security tests
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: ruh-backend

    env:
      NODE_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_URL: postgres://localhost/openclaw_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install @ruh/logger dependencies
        working-directory: packages/logger
        run: bun install --frozen-lockfile

      - name: Run security tests
        run: bun run test:security

  # ── 5. E2E tests ──────────────────────────────────────────────────────────
  backend-e2e:
    name: Backend · e2e tests
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: ruh-backend

    env:
      NODE_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_URL: postgres://localhost/openclaw_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install @ruh/logger dependencies
        working-directory: packages/logger
        run: bun install --frozen-lockfile

      - name: Run e2e tests
        run: bun run test:e2e

  # ── 6. Integration tests (real PostgreSQL) ────────────────────────────────
  backend-integration:
    name: Backend · integration (DB)
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: ruh-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openclaw_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/openclaw_test
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install @ruh/logger dependencies
        working-directory: packages/logger
        run: bun install --frozen-lockfile

      - name: Integration tests
        run: bun run test:integration

  # ── 7. Smoke tests (main branch only — boots a real server) ───────────────
  backend-smoke:
    name: Backend · smoke
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-contract, backend-security, backend-e2e, backend-integration]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    defaults:
      run:
        working-directory: ruh-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openclaw_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/openclaw_smoke
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install @ruh/logger dependencies
        working-directory: packages/logger
        run: bun install --frozen-lockfile

      - name: Smoke tests
        run: bun run test:smoke

# ─────────────────────────────────────────────────────────────────────────────
# RUH FRONTEND
# ─────────────────────────────────────────────────────────────────────────────

  # ── 8. Lint + build ───────────────────────────────────────────────────────
  frontend-build:
    name: ruh-frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruh-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

  # ── 9. Jest unit + component tests with coverage ──────────────────────────
  frontend-test:
    name: ruh-frontend · Jest (coverage)
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: ruh-frontend

    env:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests with coverage
        run: npm test -- --ci --coverage --passWithNoTests

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ruh-frontend/coverage/
          if-no-files-found: warn

  # ── 10. Playwright E2E (main + dev only) ──────────────────────────────────
  frontend-e2e:
    name: ruh-frontend · Playwright E2E
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    defaults:
      run:
        working-directory: ruh-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

      - name: Run Playwright E2E tests
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          CI: "true"
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruh-frontend-playwright-report
          path: ruh-frontend/playwright-report/
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────────────────────
# AGENT BUILDER UI
# ─────────────────────────────────────────────────────────────────────────────

  # ── 11. Build ─────────────────────────────────────────────────────────────
  agent-builder-build:
    name: agent-builder-ui · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-builder-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent-builder-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true   # non-fatal until types are fully clean

      - name: Build
        env:
          OPENCLAW_GATEWAY_URL: "ws://localhost:18789"
          OPENCLAW_GATEWAY_TOKEN: "ci-placeholder"
          OPENCLAW_GATEWAY_ORIGIN: "https://clawagentbuilder.ruh.ai"
        run: npm run build

  # ── 12. Unit tests ────────────────────────────────────────────────────────
  #    Tests are run with bun (invoked via npm scripts). Separate bun test
  #    invocations are used per group to avoid shared module-registry issues.
  agent-builder-test:
    name: agent-builder-ui · unit tests
    runs-on: ubuntu-latest
    needs: [agent-builder-build]
    defaults:
      run:
        working-directory: agent-builder-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent-builder-ui/package-lock.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        # npm run test:unit calls bun under the hood in separate invocations:
        #   test:unit:api  → bun test lib/openclaw/api.test.ts
        #   test:unit:store → bun test hooks/use-openclaw-chat.test.ts
        #   test:unit:ag-ui → bun test lib/openclaw/ag-ui/__tests__/...
        #   test:unit:core  → bun test (remaining files)
        run: npm run test:unit

  # ── 13. Playwright E2E for agent-builder-ui (main + dev only) ────────────
  agent-builder-e2e:
    name: agent-builder-ui · Playwright E2E
    runs-on: ubuntu-latest
    needs: [agent-builder-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    defaults:
      run:
        working-directory: agent-builder-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent-builder-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        env:
          OPENCLAW_GATEWAY_URL: "ws://localhost:18789"
          OPENCLAW_GATEWAY_TOKEN: "ci-placeholder"
          OPENCLAW_GATEWAY_ORIGIN: "https://clawagentbuilder.ruh.ai"
        run: npm run build

      - name: Run Playwright E2E tests
        env:
          CI: "true"
        run: |
          npm run start &
          npx wait-on http://localhost:3001 --timeout 30000
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-builder-playwright-report
          path: agent-builder-ui/playwright-report/
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────────────────────
# ADMIN UI
# ─────────────────────────────────────────────────────────────────────────────

  # ── 14. Admin UI tests ─────────────────────────────────────────────────────
  admin-ui-test:
    name: admin-ui · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

# ─────────────────────────────────────────────────────────────────────────────
# MARKETPLACE UI
# ─────────────────────────────────────────────────────────────────────────────

  # ── 15. Marketplace UI tests ───────────────────────────────────────────────
  marketplace-ui-test:
    name: marketplace-ui · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/marketplace-ui

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

# ─────────────────────────────────────────────────────────────────────────────
# DOCKER
# ─────────────────────────────────────────────────────────────────────────────

  # ── 16. Docker image build check ──────────────────────────────────────────
  #    Gates on all test jobs passing before attempting image builds.
  docker:
    name: Docker · build check
    runs-on: ubuntu-latest
    needs:
      - backend-unit
      - backend-contract
      - backend-security
      - backend-e2e
      - backend-integration
      - frontend-test
      - agent-builder-test
      - admin-ui-test
      - marketplace-ui-test
      - flutter-test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ruh-backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./ruh-frontend
          push: false
          build-args: NEXT_PUBLIC_API_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# FLUTTER APP
# ─────────────────────────────────────────────────────────────────────────────

  # ── 17. Flutter unit tests ────────────────────────────────────────────────
  flutter-test:
    name: ruh_app · Flutter unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruh_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests with coverage
        run: flutter test --no-pub --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: ruh_app/coverage/lcov.info
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-results
          path: ruh_app/test/
          if-no-files-found: warn

  # ── 18. Flutter build check ───────────────────────────────────────────────
  flutter-build:
    name: ruh_app · Flutter build (APK + Web)
    runs-on: ubuntu-latest
    needs: [flutter-test]
    defaults:
      run:
        working-directory: ruh_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug --dart-define=API_BASE_URL=https://api.ruh.ai

      - name: Build Web (release)
        run: flutter build web --release --dart-define=API_BASE_URL= --base-href="/app/"

  # ── 19. Flutter Docker image build check ─────────────────────────────────
  flutter-docker:
    name: ruh_app · Docker build check
    runs-on: ubuntu-latest
    needs: [flutter-test]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Flutter web Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./ruh_app
          push: false
          build-args: API_BASE_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max
