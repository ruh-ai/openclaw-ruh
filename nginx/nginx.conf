upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3001;
}

upstream agent_builder {
    server agent-builder-ui:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── Backend API ───────────────────────────────────────────────────────────
    # Proxy /api/*, /docs, /openapi.json, /health to the FastAPI backend
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout for sandbox creation & chat streaming
        proxy_read_timeout    180s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    180s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location = /health {
        proxy_pass http://backend;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Frontend (Next.js) ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR / future use)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
