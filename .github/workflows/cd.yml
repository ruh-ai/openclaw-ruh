name: CD

on:
  push:
    branches: [main, dev]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  RUH_APP_IMAGE: ghcr.io/${{ github.repository }}/ruh-app

jobs:

  # ── Gate: run critical tests before deploying ─────────────────────────────
  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend tests (fast suite — no DB needed)
      - name: Backend — install
        working-directory: ruh-backend
        run: |
          cd ../packages/logger && bun install && cd -
          bun install

      - name: Backend — typecheck
        working-directory: ruh-backend
        run: bun run typecheck

      - name: Backend — unit tests (non-blocking)
        continue-on-error: true
        working-directory: ruh-backend
        env:
          ALLOWED_ORIGINS: http://localhost:3000
        run: bun test tests/unit/ --timeout 30000

      # Agent Builder UI — build check
      - name: Builder — install
        working-directory: agent-builder-ui
        run: npm install

      - name: Builder — typecheck
        working-directory: agent-builder-ui
        run: npx tsc --noEmit
        continue-on-error: true  # Type errors from version drift are non-blocking

  # ── Build & push images to GHCR ───────────────────────────────────────────
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      backend-tag: ${{ steps.meta-backend.outputs.version }}
      frontend-tag: ${{ steps.meta-frontend.outputs.version }}
      ruh-app-tag: ${{ steps.meta-ruh-app.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Docker metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./ruh-backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Docker metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./ruh-frontend
          push: true
          build-args: NEXT_PUBLIC_API_URL=
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Ruh App (Flutter Web) ──────────────────────────────────────────────
      - name: Docker metadata — ruh-app
        id: meta-ruh-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RUH_APP_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ruh-app
        uses: docker/build-push-action@v6
        with:
          context: ./ruh_app
          push: true
          build-args: API_BASE_URL=
          tags: ${{ steps.meta-ruh-app.outputs.tags }}
          labels: ${{ steps.meta-ruh-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to GCE VM via SSH ──────────────────────────────────────────────
  deploy:
    name: Deploy to GCE
    runs-on: ubuntu-latest
    needs: [test, build-push]
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            cd ${{ secrets.SSH_DEPLOY_PATH }}
            bash deploy/deploy.sh
