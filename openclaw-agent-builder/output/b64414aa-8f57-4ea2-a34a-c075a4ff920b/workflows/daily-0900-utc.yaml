name: "jira-sprint-metrics-daily"
description: "Daily 09:00 UTC: sync Jira entities, compute sprint metrics, write result_metrics + result_narratives."
version: "1.0.0"

# Schedule is runner-dependent; OpenClaw deployments commonly support cron-like triggers.
# 09:00 UTC every day:
schedule:
  cron: "0 9 * * *"
  timezone: "UTC"

steps:
  - id: provision
    action: provision_schema
    skill: data-ingestion-openclaw
    input:
      organisation_id: "${env.DATA_INGESTION_ORG_ID}"
      agent_id: "${env.DATA_INGESTION_AGENT_ID}"
    run_once: true
    timeout_ms: 30000

  - id: jira_sync
    action: run
    skill: jira_entity_sync_daily
    input:
      run_id: "${run_id}"
      write: true
    wait_for: [provision]
    timeout_ms: 300000

  - id: compute
    action: run
    skill: compute_sprint_metrics
    input:
      run_id: "${run_id}"
    wait_for: [jira_sync]
    timeout_ms: 300000

  - id: prep_results
    action: run
    skill: write_results_metrics_narratives
    input:
      run_id: "${run_id}"
      metrics_json: "${compute.result_metrics_rows}"
      narratives_json: "${compute.result_narratives_rows}"
    wait_for: [compute]
    timeout_ms: 60000

  - id: write_results
    action: batch_write
    skill: data-ingestion-openclaw
    input:
      organisation_id: "${env.DATA_INGESTION_ORG_ID}"
      agent_id: "${env.DATA_INGESTION_AGENT_ID}"
      run_id: "${run_id}"
      items: "${prep_results.aggregated_results}"
      atomic: true
    wait_for: [prep_results]
    timeout_ms: 60000
