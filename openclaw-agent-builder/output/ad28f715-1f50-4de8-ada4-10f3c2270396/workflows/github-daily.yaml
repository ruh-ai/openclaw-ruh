name: "github-scoring-daily"
description: "Daily (UTC): ensure identity mapping, compute GitHub scores, write result_developer_scores + result_metrics."
version: "1.0.0"

schedule:
  # daily at 00:15 UTC
  cron: "15 0 * * *"
  timezone: "UTC"

steps:
  - id: provision
    action: provision_schema
    skill: data-ingestion-openclaw
    input:
      organisation_id: "${env.DATA_INGESTION_ORG_ID}"
      agent_id: "${env.DATA_INGESTION_AGENT_ID}"
    run_once: true
    timeout_ms: 30000

  - id: ensure_mapping
    action: run
    skill: developer_identity_mapping
    input:
      run_id: "${run_id}"
      write: true
    wait_for: [provision]
    timeout_ms: 60000

  - id: github_scoring
    action: run
    skill: github_scoring_agent
    input:
      run_id: "${run_id}"
    wait_for: [ensure_mapping]
    timeout_ms: 300000

  - id: write_results
    action: batch_write
    skill: data-ingestion-openclaw
    input:
      organisation_id: "${env.DATA_INGESTION_ORG_ID}"
      agent_id: "${env.DATA_INGESTION_AGENT_ID}"
      run_id: "${run_id}"
      items: "${github_scoring.aggregated_results}"
      atomic: true
    wait_for: [github_scoring]
    timeout_ms: 60000
