version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/ruh-backend"
    target-branch: "dev"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      production:
        dependency-type: "production"
      dev:
        dependency-type: "development"

  - package-ecosystem: "npm"
    directory: "/agent-builder-ui"
    target-branch: "dev"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      production:
        dependency-type: "production"
      dev:
        dependency-type: "development"

  - package-ecosystem: "npm"
    directory: "/ruh-frontend"
    target-branch: "dev"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      production:
        dependency-type: "production"
      dev:
        dependency-type: "development"

  - package-ecosystem: "npm"
    directory: "/admin-ui"
    target-branch: "dev"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      production:
        dependency-type: "production"
      dev:
        dependency-type: "development"

  - package-ecosystem: "npm"
    directory: "/packages/marketplace-ui"
    target-branch: "dev"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      production:
        dependency-type: "production"
      dev:
        dependency-type: "development"
