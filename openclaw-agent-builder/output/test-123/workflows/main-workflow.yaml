name: "test-123-workflow"
description: "Minimal workflow that runs the custom test skill and writes results via data-ingestion-openclaw"
version: "1.0.0"

steps:
  - id: provision
    action: provision_schema
    skill: data-ingestion-openclaw
    input:
      organisation_id: "${env.DATA_INGESTION_ORG_ID}"
      agent_id: "${env.DATA_INGESTION_AGENT_ID}"
    run_once: true
    timeout_ms: 30000

  - id: run_test
    action: run
    skill: test
    input:
      run_id: "${run_id}"
      message: "hello from test-123"
    wait_for: [provision]
    timeout_ms: 30000

  - id: write_results
    action: batch_write
    skill: data-ingestion-openclaw
    input:
      organisation_id: "${env.DATA_INGESTION_ORG_ID}"
      agent_id: "${env.DATA_INGESTION_AGENT_ID}"
      run_id: "${run_id}"
      items: "${run_test.aggregated_results}"
      atomic: true
    wait_for: [run_test]
    timeout_ms: 60000
