# ─────────────────────────────────────────────────────────────────────────────
# openclaw-ruh — Development Docker Compose
#
# Usage:
#   cp .env.example .env                    # fill in LLM keys
#   docker compose -f docker-compose.dev.yml up
#
# All services run with hot-reload via volume mounts.
# Ports exposed directly (no nginx):
#   Backend:          http://localhost:8000
#   Agent Builder UI: http://localhost:3000
#   Ruh Frontend:     http://localhost:3001
#   Admin UI:         http://localhost:3002
#   Ruh App (Flutter): http://localhost:3003
#   PostgreSQL:       localhost:5432
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-openclaw}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw} -d ${POSTGRES_DB:-openclaw}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Backend (Bun + watch mode) ─────────────────────────────────────────────
  backend:
    build:
      context: ./ruh-backend
      dockerfile: Dockerfile.dev
    command: sh -c "bun install && bun run --watch src/index.ts"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openclaw}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-openclaw}
      PORT: "8000"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
    ports:
      - "8000:8000"
    volumes:
      - ./ruh-backend:/app
      - ./packages:/packages
      - backend_node_modules:/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  # ── Agent Builder UI (Next.js dev server) ──────────────────────────────────
  agent-builder-ui:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "cp package.json /tmp/pkg.json && npm install --no-package-lock && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    volumes:
      - ./agent-builder-ui:/app
      - builder_node_modules:/app/node_modules
    networks:
      - internal
    depends_on:
      - backend

  # ── Ruh Frontend (Next.js dev server) ──────────────────────────────────────
  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3001:3001"
    volumes:
      - ./ruh-frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - internal
    depends_on:
      - backend

  # ── Admin UI (Next.js dev server) ──────────────────────────────────────────
  admin-ui:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3002:3002"
    volumes:
      - ./admin-ui:/app
      - admin_node_modules:/app/node_modules
    networks:
      - internal
    depends_on:
      - backend

  # ── Ruh App / Flutter Web (dev server) ─────────────────────────────────────
  ruh-app:
    image: ghcr.io/cirruslabs/flutter:stable
    working_dir: /app
    command: sh -c "flutter pub get && flutter run -d web-server --web-port=3003 --web-hostname=0.0.0.0"
    environment:
      API_BASE_URL: "http://localhost:8000"
    ports:
      - "3003:3003"
    volumes:
      - ./ruh_app:/app
      - flutter_pub_cache:/root/.pub-cache
    networks:
      - internal
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  builder_node_modules:
  frontend_node_modules:
  admin_node_modules:
  flutter_pub_cache:

networks:
  internal:
    driver: bridge
