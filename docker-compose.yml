# =============================================================================
# docker-compose.yml — Nikita workspace (workspace/nikita branch)
#
# Subdomains:
#   nikita.builder.codezero2pi.com → nikita-builder:3010
#   nikita.api.codezero2pi.com     → nikita-backend:8010
#
# Usage:
#   cd /opt/ruh/workspaces/nikita
#   docker compose up -d --build
# =============================================================================

services:
  nikita-backend:
    user: root
    build:
      context: .
      dockerfile: ./ruh-backend/Dockerfile
    env_file:
      - /opt/ruh/.env
    environment:
      DATABASE_URL: "postgresql://openclaw:e308bf812473e805e7b1f7bfad6d605e@ruh-postgres-1:5432/openclaw"
      PORT: "8010"
      ALLOWED_ORIGINS: "https://nikita.builder.codezero2pi.com,https://nikita.api.codezero2pi.com,https://builder.codezero2pi.com,https://api.codezero2pi.com"
      DOCKER_HOST_IP: "172.17.0.1"
      CODEX_AUTH_JSON_PATH: /root/.codex/auth.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ruh/.codex/auth.json:/root/.codex/auth.json:ro
    ports:
      - "8010:8010"
    restart: unless-stopped
    networks:
      - ruh_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nikita-builder:
    build:
      context: ./agent-builder-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://nikita.api.codezero2pi.com"
    environment:
      NODE_ENV: production
      PORT: "3010"
      OPENCLAW_TIMEOUT_MS: "600000"
    ports:
      - "3010:3010"
    restart: unless-stopped
    networks:
      - ruh_internal
    depends_on:
      nikita-backend:
        condition: service_healthy

networks:
  ruh_internal:
    external: true
