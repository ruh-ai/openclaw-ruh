# =============================================================================
# nginx-ssl.conf — Subdomain-based routing with SSL (Let's Encrypt)
#
# Subdomains:
#   builder.codezero2pi.com  → agent-builder-ui:3000
#   app.codezero2pi.com      → frontend:3001
#   admin.codezero2pi.com    → admin-ui:3002
#   api.codezero2pi.com      → backend:8000
# =============================================================================

# ── Rate limiting ────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=webhooks:1m rate=30r/m;

# ── Upstreams ────────────────────────────────────────────────────────────────
upstream backend {
    server backend:8000;
}

upstream builder {
    server agent-builder-ui:3000;
}

upstream frontend {
    server frontend:3001;
}

upstream admin {
    server admin-ui:3002;
}

# ── HTTP → HTTPS redirect (all subdomains) ───────────────────────────────────
server {
    listen 80;
    server_name builder.codezero2pi.com app.codezero2pi.com admin.codezero2pi.com api.codezero2pi.com;

    # Let's Encrypt ACME challenge (must stay on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Builder (agent-builder-ui) ───────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name builder.codezero2pi.com;

    ssl_certificate     /etc/letsencrypt/live/codezero2pi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codezero2pi.com/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    client_max_body_size 50M;

    # OpenClaw bridge — Next.js API route in the builder
    location /api/openclaw {
        proxy_pass http://builder;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://builder;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# ── App (ruh-frontend) ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name app.codezero2pi.com;

    ssl_certificate     /etc/letsencrypt/live/codezero2pi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codezero2pi.com/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    client_max_body_size 50M;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# ── Admin ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.codezero2pi.com;

    ssl_certificate     /etc/letsencrypt/live/codezero2pi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codezero2pi.com/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    client_max_body_size 50M;

    location / {
        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# ── API (backend) ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.codezero2pi.com;

    ssl_certificate     /etc/letsencrypt/live/codezero2pi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codezero2pi.com/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    client_max_body_size 50M;

    # ── Hermes Mission Control Dashboard ────────────────────────────────
    location /mission-control/ {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # ── Hermes orchestrator API (runs natively on host, not in Docker) ──
    location /hermes/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE support for event stream + long-running agent tasks
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Rate limit webhook endpoints
        limit_req zone=webhooks burst=10 nodelay;
    }

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Long timeout for sandbox creation & chat streaming
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location = /health {
        proxy_pass http://backend/health;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }
}
