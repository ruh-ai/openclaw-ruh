# Store all sensitive backend values here.
# Build DATABASE_URL from the postgres secret values, or set it explicitly.
# Generate with:
#   kubectl create secret generic backend-secret \
#     --from-literal=DAYTONA_API_KEY=... \
#     --from-literal=DATABASE_URL=postgresql://openclaw:changeme@postgres.openclaw.svc.cluster.local:5432/openclaw \
#     --from-literal=ANTHROPIC_API_KEY=... \
#     -n openclaw --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: openclaw
type: Opaque
stringData:
  DAYTONA_API_KEY:      ""            # ← required
  DATABASE_URL:         "postgresql://openclaw:changeme@postgres.openclaw.svc.cluster.local:5432/openclaw"
  ANTHROPIC_API_KEY:    ""
  OPENAI_API_KEY:       ""
  OPENROUTER_API_KEY:   ""
  GEMINI_API_KEY:       ""
  TELEGRAM_BOT_TOKEN:   ""
  DISCORD_BOT_TOKEN:    ""
