name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Typecheck + build (gating job) ─────────────────────────────────────
  backend-build:
    name: Backend · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruh-backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install workspace package dependencies
        run: cd ../packages/logger && bun install

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

  # ── 2. Fast tests with coverage (unit + e2e + security + contract) ─────────
  #    No database service needed — all modules are mocked.
  #    Runs in parallel with frontend jobs for faster feedback.
  backend-fast:
    name: Backend · unit + e2e + security + contract (coverage)
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: ruh-backend

    env:
      DAYTONA_API_KEY: ci-placeholder-key
      ALLOWED_ORIGINS: http://localhost:3000
      # No DATABASE_URL — tests in this job mock the DB layer
      DATABASE_URL: postgres://localhost/openclaw_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install workspace package dependencies
        run: cd ../packages/logger && bun install

      - name: Run fast test suites with coverage
        continue-on-error: true  # Pre-existing cross-file pollution failures — non-blocking until isolated
        run: bun run test:coverage
        # test:coverage = bun test ... --coverage --coverage-reporter=lcov
        #                 && bun run scripts/check-coverage.ts (75% threshold)

      - name: Upload backend coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ruh-backend/coverage/lcov.info

  # ── 3. Integration tests (real PostgreSQL) ────────────────────────────────
  backend-integration:
    name: Backend · integration (DB)
    runs-on: ubuntu-latest
    needs: [backend-build]
    defaults:
      run:
        working-directory: ruh-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openclaw_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/openclaw_test
      DAYTONA_API_KEY: ci-placeholder-key
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install workspace package dependencies
        run: cd ../packages/logger && bun install

      - name: Integration tests
        continue-on-error: true  # Pre-existing failures — non-blocking until isolated
        run: bun run test:integration

  # ── 4. Smoke tests (main branch only — boots a real server) ───────────────
  backend-smoke:
    name: Backend · smoke
    runs-on: ubuntu-latest
    needs: [backend-fast, backend-integration]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    defaults:
      run:
        working-directory: ruh-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openclaw_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/openclaw_smoke
      DAYTONA_API_KEY: smoke-placeholder
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install workspace package dependencies
        run: cd ../packages/logger && bun install

      - name: Smoke tests
        run: bun run test:smoke

# ─────────────────────────────────────────────────────────────────────────────
# RUH FRONTEND
# ─────────────────────────────────────────────────────────────────────────────

  # ── 5. Lint + build ───────────────────────────────────────────────────────
  frontend-build:
    name: ruh-frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruh-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

  # ── 6. Jest unit + component tests with coverage ──────────────────────────
  frontend-test:
    name: ruh-frontend · Jest (coverage)
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: ruh-frontend

    env:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests with coverage
        run: npm test -- --ci --coverage --passWithNoTests

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ruh-frontend/coverage/

  # ── 7. Playwright E2E (main + dev only) ──────────────────────────────────
  frontend-e2e:
    name: ruh-frontend · Playwright E2E
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    defaults:
      run:
        working-directory: ruh-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

      - name: Run Playwright E2E tests
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          CI: "true"
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruh-frontend-playwright-report
          path: ruh-frontend/playwright-report/

# ─────────────────────────────────────────────────────────────────────────────
# AGENT BUILDER UI
# ─────────────────────────────────────────────────────────────────────────────

  # ── 8. Lint + build ───────────────────────────────────────────────────────
  agent-builder-build:
    name: agent-builder-ui · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-builder-ui

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Type check
        run: bun run typecheck || true   # non-fatal until types are fully clean

      - name: Build
        env:
          OPENCLAW_GATEWAY_URL: "ws://localhost:18789"
          OPENCLAW_GATEWAY_TOKEN: "ci-placeholder"
          OPENCLAW_GATEWAY_ORIGIN: "https://clawagentbuilder.ruh.ai"
        run: bun run build

  # ── 9. Playwright E2E for agent-builder-ui (main + dev only) ─────────────
  agent-builder-e2e:
    name: agent-builder-ui · Playwright E2E
    runs-on: ubuntu-latest
    needs: [agent-builder-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    defaults:
      run:
        working-directory: agent-builder-ui

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        env:
          OPENCLAW_GATEWAY_URL: "ws://localhost:18789"
          OPENCLAW_GATEWAY_TOKEN: "ci-placeholder"
          OPENCLAW_GATEWAY_ORIGIN: "https://clawagentbuilder.ruh.ai"
        run: bun run build

      - name: Run Playwright E2E tests
        env:
          CI: "true"
        run: |
          bun run start &
          npx wait-on http://localhost:3001 --timeout 30000
          bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-builder-playwright-report
          path: agent-builder-ui/playwright-report/

# ─────────────────────────────────────────────────────────────────────────────
# ADMIN UI
# ─────────────────────────────────────────────────────────────────────────────

  # ── 10. Admin UI tests ──────────────────────────────────────────────────
  admin-ui-test:
    name: admin-ui — tests (coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run tests with coverage
        continue-on-error: true  # Pre-existing: next/navigation redirect export issue in bun:test
        run: bun run test:coverage
      - name: Enforce coverage threshold (60%)
        continue-on-error: true
        run: bun run scripts/check-coverage.ts

# ─────────────────────────────────────────────────────────────────────────────
# MARKETPLACE UI
# ─────────────────────────────────────────────────────────────────────────────

  # ── 11. Marketplace UI tests ────────────────────────────────────────────
  marketplace-ui-test:
    name: marketplace-ui — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/marketplace-ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test

# ─────────────────────────────────────────────────────────────────────────────
# OPENCLAW RUNTIME
# ─────────────────────────────────────────────────────────────────────────────

  # ── 12. OpenClaw runtime tests ───────────────────────────────────────────
  openclaw-runtime-test:
    name: openclaw-runtime — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/openclaw-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun test

# ─────────────────────────────────────────────────────────────────────────────
# DOCKER
# ─────────────────────────────────────────────────────────────────────────────

  # ── 13. Docker image build check ─────────────────────────────────────────
  docker:
    name: Docker · build check
    runs-on: ubuntu-latest
    needs:
      - backend-fast
      - backend-integration
      - frontend-test
      - agent-builder-build
      - admin-ui-test
      - marketplace-ui-test
      - openclaw-runtime-test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ruh-backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ruh-frontend/Dockerfile
          push: false
          build-args: NEXT_PUBLIC_API_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max
