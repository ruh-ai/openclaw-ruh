name: linear-task-manager
version: 1.0.0
description: "Daily Linear task prioritization and Telegram delivery"

trigger:
  cron: "30 2 * * *"  # 8:00 AM IST (2:30 AM UTC)

steps:
  - id: fetch
    name: "Fetch Linear Tasks"
    skill: linear-to-ingestion-wrapper
    timeout: 120s

  - id: analyze
    name: "Analyze Criticality"
    skill: task-criticality-analyzer
    depends_on: [fetch]
    timeout: 180s

  - id: digest
    name: "Build Digest"
    skill: task-digest-builder
    depends_on: [analyze]
    timeout: 60s

  - id: send
    name: "Send to Telegram"
    skill: telegram-sender
    depends_on: [digest]
    timeout: 30s

  - id: finalize
    name: "Mark Run Complete"
    command: echo "Run complete - RUN_ID=${RUN_ID}"
    depends_on: [send]
