name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: typecheck + build ───────────────────────────────────────────────
  backend:
    name: Backend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruh-backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

  # ── Backend: tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend (tests)
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: ruh-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openclaw_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/openclaw_test
      DAYTONA_API_KEY: ci-placeholder-key
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun run test:unit

      - name: Integration tests
        run: bun run test:integration

      - name: E2E tests
        run: bun run test:e2e

      - name: Security tests
        run: bun run test:security

      - name: Contract tests
        run: bun run test:contract

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ruh-backend/test-results.xml

  # ── Backend: smoke (main branch only) ─────────────────────────────────────
  backend-smoke:
    name: Backend (smoke)
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ruh-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openclaw_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/openclaw_smoke
      DAYTONA_API_KEY: smoke-placeholder
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Smoke tests
        run: bun run test:smoke

  # ── Frontend: lint + build ───────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruh-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

  # ── Frontend: unit + component tests ─────────────────────────────────────────
  frontend-test:
    name: Frontend (Jest tests)
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: ruh-frontend

    env:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test -- --ci --passWithNoTests

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ruh-frontend/coverage/

  # ── Frontend: E2E tests (main branch only) ────────────────────────────────────
  frontend-e2e:
    name: Frontend (Playwright E2E)
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ruh-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruh-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        env:
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

      - name: Run Playwright E2E tests
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          CI: "true"
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ruh-frontend/playwright-report/

  # ── Docker: validate both images build cleanly ───────────────────────────────
  docker:
    name: Docker (build check)
    runs-on: ubuntu-latest
    needs: [backend, backend-test, frontend, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./ruh-backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./ruh-frontend
          push: false
          build-args: NEXT_PUBLIC_API_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max
