apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-builder-ui
  namespace: openclaw
  labels:
    app: agent-builder-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-builder-ui
  template:
    metadata:
      labels:
        app: agent-builder-ui
    spec:
      containers:
        - name: agent-builder-ui
          image: openclaw-agent-builder-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_GATEWAY_URL
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_URL
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
