upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3001;
}

upstream agent_builder {
    server agent-builder-ui:3000;
}

upstream admin {
    server admin-ui:3002;
}

upstream ruh_app {
    server ruh-app:3003;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout for sandbox creation & chat streaming
        proxy_read_timeout    180s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    180s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location = /health {
        proxy_pass http://backend;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Agent Builder UI ──────────────────────────────────────────────────────
    location /builder/ {
        proxy_pass         http://agent_builder/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR + OpenClaw bridge)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 180s;
    }

    # ── Admin UI ──────────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://admin/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 60s;
    }

    # ── Ruh App (Flutter Web) ────────────────────────────────────────────────
    location /app/ {
        proxy_pass         http://ruh_app/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # ── Frontend (Next.js) — default catch-all ────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR / future use)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
