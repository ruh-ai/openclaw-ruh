name: Feature request
description: Propose an enhancement to the repository, workflow, or tooling.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for scoped improvements. For broad direction changes, open an issue before starting implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: The current workflow makes it hard to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Which folders, scripts, or workflows would this touch?
