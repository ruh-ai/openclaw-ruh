# =============================================================================
# docker-compose.prod.yml — Production deployment (all services, SSL)
#
# Subdomains (codezero2pi.com):
#   builder.  → agent-builder-ui:3000
#   app.      → frontend:3001
#   admin.    → admin-ui:3002
#   api.      → backend:8000
#
# Usage:
#   # First time: run deploy/init-ssl.sh to get certs
#   # Then: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-openclaw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw} -d ${POSTGRES_DB:-openclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    user: root
    build:
      context: .
      dockerfile: ./ruh-backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openclaw}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-openclaw}
      PORT: "8000"
      ALLOWED_ORIGINS: "https://builder.codezero2pi.com,https://app.codezero2pi.com,https://admin.codezero2pi.com,https://api.codezero2pi.com"
      DOCKER_HOST_IP: "172.17.0.1"
      CODEX_AUTH_JSON_PATH: /root/.codex/auth.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ruh/.codex/auth.json:/root/.codex/auth.json:ro
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  agent-builder-ui:
    build:
      context: ./agent-builder-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.codezero2pi.com"
    environment:
      NODE_ENV: production
      PORT: "3000"
      OPENCLAW_TIMEOUT_MS: "600000"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./ruh-frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.codezero2pi.com"
    environment:
      NODE_ENV: production
      PORT: "3001"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.codezero2pi.com"
    environment:
      NODE_ENV: production
      PORT: "3002"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  website:
    build:
      context: ../codezero2pi-website
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3004"
    restart: unless-stopped
    networks:
      - internal

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    # Required so the hermes.codezero2pi.com vhost can proxy to the
    # hermes-backend (:8100) and mission-control (:3333) systemd services
    # that run on the host, not in this compose network. Without this,
    # proxy_pass http://host.docker.internal:... returns 502 on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend
      - frontend
      - agent-builder-ui
      - admin-ui
      - website

  # Certbot for automatic SSL renewal
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Renew certs every 12 hours (only renews if expiring within 30 days)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
  certbot_certs:
  certbot_webroot:

networks:
  internal:
    driver: bridge
