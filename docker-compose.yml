services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-openclaw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw} -d ${POSTGRES_DB:-openclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── TypeScript/Bun backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./ruh-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ruh-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
