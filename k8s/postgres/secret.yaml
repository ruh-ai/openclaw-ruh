# Generate values with:  echo -n "yourvalue" | base64
# Or use:  kubectl create secret generic postgres-secret \
#            --from-literal=POSTGRES_USER=openclaw \
#            --from-literal=POSTGRES_PASSWORD=changeme \
#            --from-literal=POSTGRES_DB=openclaw \
#            -n openclaw --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: openclaw
type: Opaque
stringData:
  POSTGRES_USER:     openclaw
  POSTGRES_PASSWORD: changeme        # ← replace before applying
  POSTGRES_DB:       openclaw
